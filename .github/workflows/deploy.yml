name: build-deploy

on:
  push:
    branches: [ main ]

permissions:
  packages: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push QA CheatSheet
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ghcr.io/sashkeee/qa-cheatsheet:latest

      - name: Build and push PocketBase
        uses: docker/build-push-action@v5
        with:
          context: ./pocketbase
          push: true
          tags: ghcr.io/sashkeee/pocketbase:latest

      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p ~/QA_CheatSheet
            cd ~/QA_CheatSheet

            cat <<EOF > docker-compose.yml
            services:
              qa-cheatsheet:
                image: ghcr.io/sashkeee/qa-cheatsheet:latest
                container_name: qa-cheatsheet
                ports:
                  - "8082:80"
                restart: unless-stopped
                deploy:
                  resources:
                    limits:
                      cpus: '0.2'
                      memory: 256M
              pocketbase:
                image: ghcr.io/sashkeee/pocketbase:latest
                container_name: pocketbase
                ports:
                  - "8090:8090"
                volumes:
                  - pb_data:/pb/pb_data
                restart: unless-stopped
                deploy:
                  resources:
                    limits:
                      cpus: '0.1'
                      memory: 128M
            volumes:
              pb_data:
            EOF

            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull
            fuser -k 8090/tcp 2>/dev/null || true
            docker compose up -d
